input {
    kb_layout = us
    numlock_by_default = true
    follow_mouse = 1
    sensitivity = -0.1
    accel_profile = flat

    touchpad {
        natural_scroll = false
    }

    tablet {
        output = DP-2
    }
}

cursor {
    sync_gsettings_theme = true
    enable_hyprcursor = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}
